<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Daleel - Guide </title>
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    /* Make images responsive — key for your screenshots */
    img { max-width: 100% !important; height: auto !important; 
          border: 1px solid #e0e0e0; border-radius: 6px; 
          margin: 12px 0; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    /* Clean code blocks */
    pre { background: #f6f8fa !important; border-left: 3px solid #0366d6; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'Daleel',       // Site title
      repo: '',                  // Your GitHub repo URL (optional)
      loadSidebar: true,        // Enable sidebar nav
      subMaxLevel: 2,            // Auto-generate nav from headings
      search: 'auto',           // Search box
    }
  </script>
  <!-- Core Docsify — tiny, ~25KB -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <!-- Search plugin -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
